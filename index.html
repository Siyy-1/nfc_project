<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘의 띠별 운세</title>
    <style>
        /* 기존 CSS 스타일은 그대로 유지합니다. */
        body { margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; background-color: #fff8e7; font-family: 'Malgun Gothic', sans-serif; }
        .card { width: 85%; max-width: 350px; background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; padding: 30px 20px; display: none; }
        
        /* 캐릭터 이미지가 들어갈 공간 스타일 수정 */
        .character-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 테두리를 넣어 캐릭터를 돋보이게 할 수 있습니다. */
            /* border: 3px solid #d35400; border-radius: 50%; padding: 5px; background: white; */
        }
        
        /* 실제 이미지 태그 스타일 */
        #dynamic-char-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 이미지가 잘리지 않고 비율을 유지하며 꽉 차게 */
            display: none; /* 이미지가 로드되기 전까지 숨김 */
        }

        /* 이미지가 없을 때 보여줄 임시 이모지 스타일 */
        .fallback-icon { font-size: 5rem; display: block; }

        h1 { color: #d35400; font-size: 1.5rem; margin-bottom: 5px; margin-top: 0; }
        h2 { color: #333; font-size: 1.2rem; margin-bottom: 20px; }
        p.fortune-text { color: #555; font-size: 1.1rem; line-height: 1.7; word-break: keep-all; min-height: 100px; margin-bottom: 0;}
        .btn { display: inline-block; margin-top: 25px; padding: 12px 24px; background-color: #d35400; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; transition: background 0.2s; font-size: 1rem; }
        .btn:hover { background-color: #b54500; }
        
        #menu-view { width: 90%; max-width: 400px; display: none; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .grid-item { background: white; padding: 15px 5px; border-radius: 15px; text-decoration: none; color: #333; box-shadow: 0 4px 8px rgba(0,0,0,0.05); font-weight: bold; font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; transition: transform 0.1s; }
        .grid-item:active { transform: scale(0.95); }
        .grid-item span.emoji { font-size: 2rem; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="card" id="result-view">
        
        <div class="character-container" id="char-container">
            <div class="fallback-icon" id="animal-emoji">🔮</div>
            <img src="" alt="캐릭터" id="dynamic-char-img">
        </div>

        <h1 id="date-text">오늘의 운세</h1>
        <h2 id="zodiac-title">띠 이름</h2>
        <p class="fortune-text" id="fortune-desc"></p>
        
        <a href="?" class="btn">다른 띠 운세도 보기</a>
    </div>

    <div id="menu-view">
        <h1 style="color: #d35400; margin-bottom: 5px;">12지신 운세</h1>
        <p style="color: #666; font-size: 0.9rem;">원하는 띠를 선택해 보세요.</p>
        <div class="grid" id="zodiac-grid"></div>
    </div>

    <script>
        // 기초 데이터 (이모지는 메뉴 화면용으로 남겨둡니다)
        const zodiacs = {
            'rat': { title: '쥐띠', icon: '🐭' }, 'ox': { title: '소띠', icon: '🐮' }, 'tiger': { title: '호랑이띠', icon: '🐯' }, 'rabbit': { title: '토끼띠', icon: '🐰' },
            'dragon': { title: '용띠', icon: '🐲' }, 'snake': { title: '뱀띠', icon: '🐍' }, 'horse': { title: '말띠', icon: '🐴' }, 'sheep': { title: '양띠', icon: '🐑' },
            'monkey': { title: '원숭이띠', icon: '🐵' }, 'rooster': { title: '닭띠', icon: '🐔' }, 'dog': { title: '개띠', icon: '🐶' }, 'pig': { title: '돼지띠', icon: '🐷' }
        };

        // ★★★ [가장 중요한 부분] 데이터 구조 수정 ★★★
        // 각 운세 문구별로 어울리는 이미지 주소를 한 쌍으로 묶습니다.
        // 여기에 직접 AI로 생성한 GIF나 이미지 링크를 넣으시면 됩니다.
        const fortuneDataPool = [
            { 
                text: "재물운이 아주 좋습니다! 뜻밖의 횡재수나 기분 좋은 보너스를 기대해 보세요.",
                // 예시: 돈벼락을 맞으며 기뻐하는 토끼 GIF
                imgUrl: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Y4M2RpY2I0Mml6ZWljYnlvYm5xZ2V6ODl4ZWxndXJvZWltNWhvYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/LdOyjZ7Rl5Mkg/giphy.gif"
            },
            { 
                text: "오늘은 꼼꼼한 일 처리가 빛을 발합니다. 주변의 인정을 받아 승진 기회가 생길 수도 있습니다.",
                // 예시: 열심히 서류 작업하는 안경 쓴 양 GIF
                imgUrl: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Y4M2RpY2I0Mml6ZWljYnlvYm5xZ2V6ODl4ZWxndXJvZWltNWhvYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3oKIPnAiaMCws8nruU/giphy.gif"
            },
            { 
                text: "대인 관계가 원만해집니다. 오해가 풀리고 주변 사람들과 즐거운 시간을 보낼 수 있습니다.",
                // 예시: 친구들과 파티하며 춤추는 원숭이 GIF
                imgUrl: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Y4M2RpY2I0Mml6ZWljYnlvYm5xZ2V6ODl4ZWxndXJvZWltNWhvYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l3V0lsGtTMSB5YNgc/giphy.gif"
            },
            { 
                text: "오늘은 몸과 마음의 휴식이 필요한 때입니다. 무리하지 말고 일찍 귀가하여 에너지를 충전하세요.",
                // 예시: 이불 속에서 귤 까먹는 게으른 돼지 GIF
                imgUrl: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Y4M2RpY2I0Mml6ZWljYnlvYm5xZ2V6ODl4ZWxndXJvZWltNWhvYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/mCRJDo24UvM40/giphy.gif"
            },
            { 
                text: "금전적인 지출을 조심해야 하는 날입니다. 충동구매를 피하고 계획적인 소비를 하세요.",
                // 예시: 지갑이 텅 비어 우는 쥐 PNG/GIF
                imgUrl: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Y4M2RpY2I0Mml6ZWljYnlvYm5xZ2V6ODl4ZWxndXJvZWltNWhvYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/OPU6wUK6HaoZdV4VKv/giphy.gif"
            }
            // ... 이런 식으로 어울리는 문구와 이미지 쌍을 더 추가해 주세요.
        ];

        // 날짜와 띠를 조합하여 오늘의 운세(데이터 객체) 선택
        function getDailyFortuneData(signKey) {
            const today = new Date();
            const dateSeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
            const signSeed = signKey.length + signKey.charCodeAt(0); 
            const index = Math.abs(dateSeed + signSeed) % fortuneDataPool.length;
            // 인덱스에 해당하는 { text, imgUrl } 객체 전체를 반환
            return fortuneDataPool[index];
        }

        // 화면 제어 로직
        const urlParams = new URLSearchParams(window.location.search);
        const currentSign = urlParams.get('sign');
        const today = new Date();

        if (currentSign && zodiacs[currentSign]) {
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('date-text').innerText = `${today.getMonth() + 1}월 ${today.getDate()}일 오늘의 운세`;
            document.getElementById('zodiac-title').innerText = zodiacs[currentSign].title;
            
            // 1. 오늘의 운세 데이터 가져오기
            const todayFortune = getDailyFortuneData(currentSign);
            
            // 2. 텍스트 화면에 출력
            document.getElementById('fortune-desc').innerText = todayFortune.text;
            
            // 3. 이미지를 화면에 출력
            const imgTag = document.getElementById('dynamic-char-img');
            const fallbackEmoji = document.getElementById('animal-emoji');

            if (todayFortune.imgUrl) {
                // 데이터에 이미지 주소가 있는 경우
                imgTag.src = todayFortune.imgUrl; // 이미지 주소 설정
                imgTag.style.display = 'block'; // 이미지 태그 보이기
                fallbackEmoji.style.display = 'none'; // 임시 이모지 숨기기
            } else {
                // 이미지 주소가 없는 경우 (이모지로 대체)
                fallbackEmoji.innerText = zodiacs[currentSign].icon;
                imgTag.style.display = 'none';
                fallbackEmoji.style.display = 'block';
            }
            
        } else {
            // 메뉴 화면 로직 (동일)
            document.getElementById('menu-view').style.display = 'block';
            const grid = document.getElementById('zodiac-grid');
            for (const [key, data] of Object.entries(zodiacs)) {
                const link = document.createElement('a');
                link.href = `?sign=${key}`; link.className = 'grid-item';
                link.innerHTML = `<span class="emoji">${data.icon}</span><span>${data.title}</span>`;
                grid.appendChild(link);
            }
        }
    </script>
</body>
</html>
