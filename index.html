<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘의 띠별 운세</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff8e7; /* 따뜻한 느낌의 배경색 */
            font-family: 'Malgun Gothic', sans-serif;
        }
        .card {
            width: 85%;
            max-width: 350px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            padding: 30px 20px;
        }
        .icon {
            font-size: 4rem; /* 이미지를 넣기 전 임시 이모지 크기 */
            margin-bottom: 10px;
        }
        h1 {
            color: #d35400;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        h2 {
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        p.fortune-text {
            color: #555;
            font-size: 1rem;
            line-height: 1.6;
            word-break: keep-all;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon" id="animal-icon">🔮</div>
        <h1 id="date-text">오늘의 운세</h1>
        <h2 id="zodiac-title">띠를 인식해 주세요</h2>
        <p class="fortune-text" id="fortune-desc">NFC 키링을 태그하면 운세가 나타납니다.</p>
    </div>

    <script>
        // 1. 오늘 날짜 표시하기
        const today = new Date();
        document.getElementById('date-text').innerText = `${today.getMonth() + 1}월 ${today.getDate()}일 오늘의 운세`;

        // 2. 12지신 데이터 (원하는 문구로 수정 가능!)
        const horoscopes = {
            'rat': { title: '쥐띠', icon: '🐭', desc: '재물운이 상승하는 날입니다. 뜻밖의 수입을 기대해 보셔도 좋습니다.' },
            'ox': { title: '소띠', icon: '🐮', desc: '성실함이 빛을 발하는 하루입니다. 하던 일을 꾸준히 밀고 나가세요.' },
            'tiger': { title: '호랑이띠', icon: '🐯', desc: '자신감이 넘치는 날입니다. 새로운 도전을 하기에 아주 좋은 타이밍입니다.' },
            'rabbit': { title: '토끼띠', icon: '🐰', desc: '대인 관계가 원만해집니다. 주변 사람들과 즐거운 시간을 보낼 수 있습니다.' },
            'dragon': { title: '용띠', icon: '🐲', desc: '막혀있던 문제가 해결될 조짐이 보입니다. 마음의 여유를 가지세요.' },
            'snake': { title: '뱀띠', icon: '🐍', desc: '직감력이 뛰어난 날입니다. 중요한 결정은 당신의 느낌을 믿어보세요.' },
            'horse': { title: '말띠', icon: '🐴', desc: '이동수가 있습니다. 가벼운 산책이나 짧은 여행이 기분 전환에 도움이 됩니다.' },
            'sheep': { title: '양띠', icon: '🐑', desc: '예술적인 영감이 떠오르는 날입니다. 창작 활동이나 취미에 집중해 보세요.' },
            'monkey': { title: '원숭이띠', icon: '🐵', desc: '센스와 재치가 돋보이는 하루입니다. 문제 해결 능력이 탁월해집니다.' },
            'rooster': { title: '닭띠', icon: '🐔', desc: '꼼꼼한 일 처리가 인정을 받습니다. 작은 디테일에 신경 쓰세요.' },
            'dog': { title: '개띠', icon: '🐶', desc: '가족이나 가까운 친구에게 좋은 일이 생길 수 있습니다. 함께 기뻐해 주세요.' },
            'pig': { title: '돼지띠', icon: '🐷', desc: '먹을 복이 있는 날입니다. 맛있는 음식을 먹으며 스트레스를 날려보세요.' }
        };

        // 3. URL에서 파라미터(sign=?) 값 읽어오기
        const urlParams = new URLSearchParams(window.location.search);
        const sign = urlParams.get('sign');

        // 4. 화면에 데이터 뿌려주기
        if (sign && horoscopes[sign]) {
            document.getElementById('animal-icon').innerText = horoscopes[sign].icon;
            document.getElementById('zodiac-title').innerText = horoscopes[sign].title;
            document.getElementById('fortune-desc').innerText = horoscopes[sign].desc;
        } else if (sign) {
            document.getElementById('zodiac-title').innerText = "알 수 없는 띠";
            document.getElementById('fortune-desc').innerText = "잘못된 NFC 정보입니다.";
            document.getElementById('fortune-desc').classList.add('error');
        }
    </script>
</body>
</html>
