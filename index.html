<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFC 스캔 결과</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 화면 전체 높이 사용 */
            background-color: #2c3e50; /* 깔끔한 어두운 배경 */
            font-family: sans-serif;
        }
        .card {
            width: 80%;
            max-width: 320px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            overflow: hidden;
            text-align: center;
            padding-bottom: 20px;
        }
        img {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 2px solid #eee;
        }
        h2 {
            margin: 20px 0 10px;
            color: #333;
            font-size: 1.4rem;
        }
        p {
            color: #666;
            font-size: 0.9rem;
            margin: 0 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/400x400?text=My+Custom+Character" alt="캐릭터 이미지">
        <h2>스캔 완료!</h2>
        <p>NFC 태그가 성공적으로 인식되었습니다.</p>
    </div>

</body>
</html>
